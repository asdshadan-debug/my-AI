<!DOCTYPE html>
<html>
<head>
<title>Shadan AI</title>
</head>

<body>

<h2>Shadan AI Chat</h2>

<input id="msg" placeholder="message">
<button onclick="send()">Send</button>

<div id="chat"></div>

<script>

async function send(){

let message = document.getElementById("msg").value;

let res = await fetch("https://shadan-ai.onrender.com/chat",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
message:message
})
});

let data = await res.json();

document.getElementById("chat").innerHTML += "<p><b>You:</b> "+message+"</p>";
document.getElementById("chat").innerHTML += "<p><b>AI:</b> "+data.reply+"</p>";

}

</script>

</body>
</html>
