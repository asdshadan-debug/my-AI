<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Shadan AI Chat</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;display:flex;height:100vh;background:#eef2f7;color:#333;}

#sidebar{
width:280px;
background:#fff;
border-right:1px solid #ddd;
display:flex;
flex-direction:column;
padding-top:20px;
}

#sidebar h2{
text-align:center;
margin-bottom:20px;
font-size:24px;
color:#4CAF50;
}

#new-chat{
margin:0 20px 15px 20px;
padding:12px;
background:#4CAF50;
color:#fff;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
}

#chat-list{
flex:1;
overflow-y:auto;
padding:0 10px;
}

.chat-item{
padding:10px 12px;
margin-bottom:8px;
background:#f1f3f6;
border-radius:8px;
cursor:pointer;
}

#chat-window{
flex:1;
display:flex;
flex-direction:column;
background:#f9faff;
}

#messages{
flex:1;
padding:25px 20px;
overflow-y:auto;
display:flex;
flex-direction:column;
gap:15px;
}

.message{
max-width:70%;
padding:12px 15px;
border-radius:15px;
font-size:16px;
line-height:1.4;
}

.user{
align-self:flex-end;
background:#4CAF50;
color:#fff;
}

.ai{
align-self:flex-start;
background:#fff;
color:#333;
}

.greeting{
font-size:20px;
font-weight:bold;
text-align:center;
background:#000;
color:#fff;
padding:15px;
border-radius:10px;
}

#input-box{
display:flex;
padding:12px 20px;
border-top:1px solid #ddd;
background:#fff;
}

#msg{
flex:1;
padding:12px 15px;
font-size:16px;
border-radius:20px;
border:1px solid #ccc;
outline:none;
}

#send{
padding:12px 25px;
margin-left:12px;
background:#4CAF50;
color:#fff;
border:none;
border-radius:20px;
font-size:16px;
cursor:pointer;
}
</style>
</head>

<body>

<div id="sidebar">
<h2>Shadan AI</h2>
<button id="new-chat">New Chat</button>
<div id="chat-list"></div>
</div>

<div id="chat-window">
<div id="messages"></div>

<div id="input-box">
<input type="text" id="msg" placeholder="Type a message...">
<button id="send">Send</button>
</div>
</div>

<script>

let chats=[];
let currentChatIndex=-1;

const chatList=document.getElementById("chat-list");
const messagesDiv=document.getElementById("messages");
const msgInput=document.getElementById("msg");
const sendBtn=document.getElementById("send");

function startNewChat(){

chats.push([
{role:"Shadan AI",content:"Hello! I am Shadan AI. How can I help you?",greeting:true}
]);

currentChatIndex=chats.length-1;

renderChatList();
renderMessages();

}

window.onload=()=>{startNewChat();}

function renderChatList(){

chatList.innerHTML="";

chats.forEach((chat,index)=>{

const div=document.createElement("div");
div.className="chat-item";
div.innerText="Chat "+(index+1);

div.onclick=()=>{

currentChatIndex=index;
renderMessages();

};

chatList.appendChild(div);

});

}

function renderMessages(){

messagesDiv.innerHTML="";

if(currentChatIndex===-1)return;

chats[currentChatIndex].forEach(m=>{

const div=document.createElement("div");

div.className="message "+(m.role==="User"?"user":"ai");

if(m.greeting)div.classList.add("greeting");

div.innerText=m.content;

messagesDiv.appendChild(div);

});

messagesDiv.scrollTop=messagesDiv.scrollHeight;

}

async function sendMessage(){

const message=msgInput.value.trim();

if(!message)return;

let chat=chats[currentChatIndex];

if(chat[0].greeting)chat.shift();

chat.push({role:"User",content:message});

renderMessages();

msgInput.value="";

try{

const res=await fetch("https://shadan-ai.onrender.com/chat",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
message:message
})

});

const data=await res.json();

chat.push({role:"Shadan AI",content:data.reply});

renderMessages();

}catch{

chat.push({role:"Shadan AI",content:"Server error"});

renderMessages();

}

}

sendBtn.onclick=sendMessage;

msgInput.addEventListener("keypress",e=>{
if(e.key==="Enter")sendMessage();
});

</script>

</body>
</html>
